services:
  postgres:
    image: postgres:16-alpine
    container_name: saayro-postgres
    command: ["postgres", "-c", "hba_file=/etc/postgresql/pg_hba.conf"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: saayro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - saayro_postgres_data:/var/lib/postgresql/data
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saayro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  saayro_postgres_data:
